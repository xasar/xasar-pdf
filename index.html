<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Annotator Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<!-- Dynamic highlight selection colour – updated by js/ui.js -->
<style id="hl-sel-style">.tool-highlight .text-layer ::selection{background:rgba(253,224,71,0.45);}</style>
</head>
<body>

<!-- Upload Screen -->
<div id="upload-screen">
  <div class="drop-zone" id="drop-zone">
    <i class="fas fa-file-pdf"></i>
    <h2>Open PDF Document</h2>
    <p>Drag and drop your PDF here, or click to browse</p>
    <div class="browse-btn">Browse Files</div>
    <p style="margin-top:14px;font-size:11px;opacity:0.5;">Supports .pdf files</p>
    <input type="file" accept=".pdf,application/pdf" class="hidden-input" id="file-input">
  </div>
</div>

<!-- Main App -->
<div id="app">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="logo"><i class="fas fa-file-pdf" style="margin-right:5px;"></i>PDF Annotator</div>
    <div class="divider"></div>
    <button class="tb-btn" id="btn-open" title="Open PDF"><i class="fas fa-folder-open"></i></button>
    <input type="file" accept=".pdf,application/pdf" class="hidden-input" id="file-input-2">
    <div class="divider"></div>
    <button class="tb-btn active" data-tool="hand" id="tool-hand" title="Hand (H)"><i class="fas fa-hand"></i><span style="font-size:11px;">Select</span></button>
    <button class="tb-btn" data-tool="highlight" id="tool-highlight" title="Highlight (L)" style="position:relative;">
      <i class="fas fa-highlighter"></i><span style="font-size:11px;">Highlight</span>
      <div class="hl-popover" id="hl-popover">
        <div style="font-size:10px;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Highlight Color</div>
        <div class="color-grid" id="color-grid"></div>
      </div>
    </button>
    <button class="tb-btn" data-tool="text" id="tool-text" title="Insert Text (T)"><i class="fas fa-font"></i><span style="font-size:11px;">Text</span></button>
    <button class="tb-btn" data-tool="symbol" id="tool-symbol" title="Insert Symbol (S)">
      <i class="fas fa-check-square"></i><span style="font-size:11px;">Symbol</span>
    </button>
    <button class="tb-btn" data-tool="image" id="tool-image" title="Insert Image (I)"><i class="fas fa-image"></i><span style="font-size:11px;">Image</span></button>
    <div class="divider"></div>
    <button class="tb-btn" id="btn-page-manager" title="Page Manager"><i class="fas fa-layer-group"></i><span style="font-size:11px;">Pages</span></button>
    <div class="divider"></div>
    <div class="toolbar-right">
      <span id="ann-count" style="font-size:11px;color:var(--text-muted);margin-right:4px;"></span>
      <button class="tb-btn danger-btn" id="btn-clear-page" title="Clear Page Annotations"><i class="fas fa-eraser"></i></button>
      <button class="tb-btn danger-btn" id="btn-clear-all" title="Clear All Annotations"><i class="fas fa-trash"></i></button>
      <div class="divider"></div>
      <button class="tb-btn" style="color:var(--accent);padding:0 10px;gap:5px;" id="btn-export" title="Export PDF">
        <i class="fas fa-file-pdf"></i><span style="font-size:12px;">Export</span>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="page-panel">
      <div class="page-panel-header">
        <span class="page-panel-label">Pages</span>
        <div class="page-panel-actions">
          <button class="pp-btn" id="pp-add" title="Add Blank Page"><i class="fas fa-plus"></i></button>
          <button class="pp-btn danger" id="pp-manage" title="Manage Pages"><i class="fas fa-sliders"></i></button>
        </div>
      </div>
      <div class="page-thumbs" id="page-thumbs"></div>
    </div>
    <div class="viewer-area tool-hand" id="viewer-area">
      <div class="page-container" id="page-container">
        <canvas id="pdf-canvas"></canvas>
        <div class="text-layer" id="text-layer"></div>
        <div class="annotation-layer" id="annotation-layer"></div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <button class="status-btn" id="sb-prev" title="Previous Page"><i class="fas fa-chevron-left"></i></button>
    <input type="number" class="status-page-input" id="sb-page-input" value="1" min="1">
    <span>/</span>
    <span id="sb-total">0</span>
    <button class="status-btn" id="sb-next" title="Next Page"><i class="fas fa-chevron-right"></i></button>
    <div class="divider"></div>
    <button class="status-btn" id="sb-zoom-out" title="Zoom Out"><i class="fas fa-minus"></i></button>
    <input type="range" class="zoom-slider" id="zoom-slider" min="25" max="400" value="100">
    <button class="status-btn" id="sb-zoom-in" title="Zoom In"><i class="fas fa-plus"></i></button>
    <span id="sb-zoom-label" style="min-width:38px;text-align:center;font-size:12px;">100%</span>
    <button class="status-btn" id="sb-fit" title="Fit to Width"><i class="fas fa-arrows-left-right"></i></button>
    <div class="spacer"></div>
    <span id="ann-count-status" style="font-size:11px;"></span>
  </div>
</div>

<!-- Symbol Picker Panel (fixed overlay, positioned by js/ui.js) -->
<div class="symbol-picker" id="symbol-picker-panel">
  <div class="symbol-picker-title">Special Symbols — click one then click on PDF</div>
  <div class="symbol-grid" id="symbol-grid"></div>
  <div class="sym-size-row">
    <label>Size</label>
    <input type="range" class="sym-size-slider" id="sym-size-slider" min="10" max="96" value="24">
    <span class="sym-size-label" id="sym-size-label">24px</span>
  </div>
</div>

<!-- Page Manager Modal -->
<div class="modal-overlay" id="page-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3><i class="fas fa-layer-group" style="margin-right:8px;color:var(--accent);"></i>Page Manager</h3>
      <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
    </div>
    <div style="font-size:12px;color:var(--text-muted);">Drag pages to reorder. Click <i class="fas fa-trash" style="color:#ef4444;"></i> to delete.</div>
    <div class="modal-pages-grid" id="modal-pages-grid"></div>
    <div class="modal-actions">
      <button class="modal-btn primary" id="modal-add-blank"><i class="fas fa-plus"></i>Add Blank Page</button>
      <button class="modal-btn" id="modal-close-btn">Close</button>
    </div>
  </div>
</div>

<!-- Hidden inputs & toast container -->
<input type="file" accept="image/*" class="hidden-input" id="image-input">
<div class="toast-container" id="toast-container"></div>

<!-- JS modules in dependency order -->
<script src="js/constants.js"></script>
<script src="js/state.js"></script>
<script src="js/pdf-engine.js"></script>
<script src="js/annotations.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
